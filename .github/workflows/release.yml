name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish assets to, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Rust formatting check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri bundles
        run: npm run tauri:build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Codex Switch Helper ${{ env.RELEASE_TAG }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*setup.exe
